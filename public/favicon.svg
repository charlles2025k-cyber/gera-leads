<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient for Funnel -->
    <linearGradient id="funnelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="30%" stop-color="#6366F1" />
      <stop offset="70%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    
    <!-- Gradients for the Lead Dots -->
    <linearGradient id="blueLead" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="purpleLead" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="pinkLead" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6" />
      <stop offset="100%" stop-color="#DB2777" />
    </linearGradient>
    <linearGradient id="greenLead" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <!-- Funnel Outer Body -->
  <path d="M 90 140 
           C 90 140, 210 320, 210 340 
           L 210 430 
           C 210 440, 220 450, 230 450 
           L 282 450 
           C 292 450, 302 440, 302 430 
           L 302 340 
           C 302 320, 422 140, 422 140 
           C 430 128, 420 110, 400 110 
           L 112 110 
           C 92 110, 82 128, 90 140 Z" 
        fill="url(#funnelGrad)" />

  <!-- Inner Top Opening Overlay (creates 3D hollow depth) -->
  <ellipse cx="256" cy="120" rx="140" ry="12" fill="#1E1B4B" opacity="0.4" />

  <!-- Leads/Dots falling into the funnel -->
  <!-- Top Incoming Leads -->
  <circle cx="256" cy="50" r="28" fill="url(#blueLead)" />
  <circle cx="180" cy="75" r="20" fill="url(#pinkLead)" />
  <circle cx="324" cy="72" r="22" fill="url(#greenLead)" />

  <!-- Leads entering/inside the funnel (semi-transparent to look filtered/captured) -->
  <circle cx="220" cy="150" r="16" fill="url(#purpleLead)" opacity="0.9" />
  <circle cx="290" cy="180" r="18" fill="url(#blueLead)" opacity="0.9" />
  <circle cx="245" cy="230" r="14" fill="url(#pinkLead)" opacity="0.95" />
  <circle cx="270" cy="290" r="12" fill="url(#greenLead)" opacity="0.95" />

  <!-- Lead exiting the bottom of the funnel -->
  <circle cx="256" cy="485" r="15" fill="url(#blueLead)" />
</svg>